<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Frequency Detector</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #111;
      color: #fff;
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 32px;
    }

    h1 {
      font-size: 1.2rem;
      color: #888;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    #freq-display {
      font-size: 5rem;
      font-weight: 700;
      font-family: 'Courier New', monospace;
      color: #fff;
      min-width: 320px;
      text-align: center;
      transition: color 0.1s;
    }

    #freq-display.active { color: #4ade80; }

    #note-display {
      font-size: 2rem;
      color: #888;
      min-height: 2.5rem;
      text-align: center;
    }

    #bar-container {
      width: 320px;
      height: 8px;
      background: #333;
      border-radius: 4px;
      overflow: hidden;
    }

    #amplitude-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #3b82f6, #4ade80);
      border-radius: 4px;
      transition: width 0.05s;
    }

    #btn {
      padding: 16px 48px;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      background: #3b82f6;
      color: #fff;
      letter-spacing: 0.05em;
      transition: background 0.2s, transform 0.1s;
    }

    #btn:hover { background: #2563eb; }
    #btn:active { transform: scale(0.97); }
    #btn.listening { background: #22c55e; }
    #btn.listening:hover { background: #16a34a; }

    #status {
      font-size: 0.8rem;
      color: #555;
      min-height: 1.2em;
    }
  </style>
</head>
<body>
  <h1>Dominant Frequency</h1>
  <div id="freq-display">-- Hz</div>
  <div id="note-display"></div>
  <div id="bar-container"><div id="amplitude-bar"></div></div>
  <button id="btn">Start Listening</button>
  <div id="status"></div>

  <script>
    const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];

    function freqToNote(freq) {
      if (freq <= 0) return '';
      const semitones = 12 * Math.log2(freq / 440);
      const midi = Math.round(semitones) + 69;
      const note = NOTE_NAMES[midi % 12];
      const octave = Math.floor(midi / 12) - 1;
      const cents = Math.round((semitones - Math.round(semitones)) * 100);
      const sign = cents >= 0 ? '+' : '';
      return `${note}${octave}  ${sign}${cents}¢`;
    }

    let audioCtx = null, analyser = null, stream = null, animFrame = null;

    const btn = document.getElementById('btn');
    const freqDisplay = document.getElementById('freq-display');
    const noteDisplay = document.getElementById('note-display');
    const amplitudeBar = document.getElementById('amplitude-bar');
    const status = document.getElementById('status');

    btn.addEventListener('click', () => {
      if (animFrame) stopListening(); else startListening();
    });

    async function startListening() {
      try {
        status.textContent = 'Requesting microphone…';
        stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 8192;
        analyser.smoothingTimeConstant = 0.6;
        audioCtx.createMediaStreamSource(stream).connect(analyser);

        btn.textContent = 'Stop Listening';
        btn.classList.add('listening');
        freqDisplay.classList.add('active');
        status.textContent = '';
        poll();
      } catch (e) {
        status.textContent = 'Microphone access denied: ' + e.message;
      }
    }

    function stopListening() {
      cancelAnimationFrame(animFrame);
      animFrame = null;
      stream && stream.getTracks().forEach(t => t.stop());
      audioCtx && audioCtx.close();
      stream = audioCtx = analyser = null;

      btn.textContent = 'Start Listening';
      btn.classList.remove('listening');
      freqDisplay.classList.remove('active');
      freqDisplay.textContent = '-- Hz';
      noteDisplay.textContent = '';
      amplitudeBar.style.width = '0%';
    }

    function poll() {
      const buf = new Float32Array(analyser.frequencyBinCount);
      analyser.getFloatFrequencyData(buf);

      // Find peak bin (skip DC at 0)
      let maxVal = -Infinity, maxIdx = 1;
      for (let i = 1; i < buf.length; i++) {
        if (buf[i] > maxVal) { maxVal = buf[i]; maxIdx = i; }
      }

      // Parabolic interpolation for sub-bin precision
      let refined = maxIdx;
      if (maxIdx > 0 && maxIdx < buf.length - 1) {
        const p = buf[maxIdx - 1], n = buf[maxIdx + 1];
        const denom = 2 * maxVal - p - n;
        if (denom !== 0) refined = maxIdx + (n - p) / (2 * denom);
      }

      const freq = refined * audioCtx.sampleRate / analyser.fftSize;
      const amp = Math.max(0, Math.min(1, (maxVal + 100) / 100));

      freqDisplay.textContent = freq.toFixed(2) + ' Hz';
      noteDisplay.textContent = freqToNote(freq);
      amplitudeBar.style.width = (amp * 100) + '%';

      animFrame = requestAnimationFrame(poll);
    }
  </script>
</body>
</html>
